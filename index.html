<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansh Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#000;
}

.logo{
    font-size:22px;
    font-weight:700;
}

/* BUTTON */
button{
    padding:6px 12px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

/* HERO */
.hero{
    padding:60px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1e1e1e;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,255,200,0.5);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

/* LOGIN BOX */
#loginBox{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:8px;
    width:250px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Ansh Games</div>

    <div id="authArea">
        <button onclick="showLogin()">Login</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to Ansh Games</h1>
    <p>Explore and download popular games</p>
</div>

<!-- GAMES -->
<div class="grid">

    <div class="card">
        <img src="fortnite.jpg">
        <div class="card-content">
            <h3>Fortnite</h3>
            <button onclick="openGame('fortnite')">Download</button>
        </div>
    </div>

    <div class="card">
        <img src="gta.jpg">
        <div class="card-content">
            <h3>GTA V</h3>
            <button onclick="openGame('gta')">Download</button>
        </div>
    </div>

    <div class="card">
        <img src="minecraft.jpg">
        <div class="card-content">
            <h3>Minecraft</h3>
            <button onclick="openGame('minecraft')">Download</button>
        </div>
    </div>

    <div class="card">
        <img src="valorant.jpg">
        <div class="card-content">
            <h3>Valorant</h3>
            <button onclick="openGame('valorant')">Download</button>
        </div>
    </div>

    <div class="card">
        <img src="cod.jpg">
        <div class="card-content">
            <h3>Call of Duty</h3>
            <button onclick="openGame('cod')">Download</button>
        </div>
    </div>

    <div class="card">
        <img src="roblox.jpg">
        <div class="card-content">
            <h3>Roblox</h3>
            <button onclick="openGame('roblox')">Download</button>
        </div>
    </div>

</div>

<!-- LOGIN POPUP -->
<div id="loginBox">
    <h3>Login</h3>

    <input id="username" placeholder="Username" style="width:100%"><br><br>
    <input id="password" type="password" placeholder="Password" style="width:100%"><br><br>

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="closeLogin()">Close</button>
</div>

<script>

// GAME LINKS
function openGame(game){
    if(game==="fortnite") window.open("https://www.epicgames.com/fortnite");
    if(game==="gta") window.open("https://www.rockstargames.com/gta-v");
    if(game==="minecraft") window.open("https://www.minecraft.net");
    if(game==="valorant") window.open("https://playvalorant.com");
    if(game==="cod") window.open("https://www.callofduty.com");
    if(game==="roblox") window.open("https://www.roblox.com");
}

// LOGIN UI
function showLogin(){
    document.getElementById("loginBox").style.display="block";
}

function closeLogin(){
    document.getElementById("loginBox").style.display="none";
}

// SIGNUP
function signup(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Account created!");
}

// LOGIN
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let savedUser = localStorage.getItem("user");
    let savedPass = localStorage.getItem("pass");

    if(user === savedUser && pass === savedPass){
        document.getElementById("authArea").innerHTML =
        `<span>Welcome ${user}</span> <button onclick="logout()">Logout</button>`;

        closeLogin();
    } else {
        alert("Wrong username or password!");
    }
}

// LOGOUT
function logout(){
    location.reload();
}

</script>

</body>
</html>

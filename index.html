<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ansh Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#000;
}

.logo{
    font-size:22px;
    font-weight:700;
}

.nav-links a{
    color:white;
    margin-left:25px;
    text-decoration:none;
}

.nav-links a:hover{
    color:#00ffcc;
}

.search{
    padding:6px 10px;
    border:none;
    border-radius:4px;
}

/* HERO */
.hero{
    padding:60px;
    background:linear-gradient(to right,#000,#1a1a1a);
}

/* SECTION */
.section{
    padding:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1e1e1e;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,255,200,0.5);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0 0 10px;
}

.card button{
    padding:8px 15px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

.card button:hover{
    background:white;
    color:black;
}

/* ABOUT */
.about{
    padding:40px;
    background:#181818;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#aaa;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Ansh Games</div>

    <input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">

    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#games">Games</a>
        <a href="#about">About</a>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
    <h1>Welcome to Ansh Games</h1>
    <p>Explore and download popular games</p>
</div>

<!-- GAMES -->
<div class="section" id="games">
    <h2>Popular Games</h2>

    <div class="grid">

        <div class="card">
            <img src="fortnite.jpg">
            <div class="card-content">
                <h3>Fortnite</h3>
                <button onclick="openGame('fortnite')">Download</button>
            </div>
        </div>

        <div class="card">
            <img src="gta.jpg">
            <div class="card-content">
                <h3>GTA V</h3>
                <button onclick="openGame('gta')">Download</button>
            </div>
        </div>

        <div class="card">
            <img src="minecraft.jpg">
            <div class="card-content">
                <h3>Minecraft</h3>
                <button onclick="openGame('minecraft')">Download</button>
            </div>
        </div>

        <div class="card">
            <img src="valorant.jpg">
            <div class="card-content">
                <h3>Valorant</h3>
                <button onclick="openGame('valorant')">Download</button>
            </div>
        </div>

        <div class="card">
            <img src="cod.jpg">
            <div class="card-content">
                <h3>Call of Duty</h3>
                <button onclick="openGame('cod')">Download</button>
            </div>
        </div>

        <div class="card">
            <img src="roblox.jpg">
            <div class="card-content">
                <h3>Roblox</h3>
                <button onclick="openGame('roblox')">Download</button>
            </div>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="about" id="about">
    <h2>About</h2>
    <p>Ansh Games is your gaming hub to explore popular games and access their official download pages.</p>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Ansh Games
</div>

<script>
function openGame(game){
    if(game==="fortnite") window.open("https://www.epicgames.com/fortnite");
    if(game==="gta") window.open("https://www.rockstargames.com/gta-v");
    if(game==="minecraft") window.open("https://www.minecraft.net");
    if(game==="valorant") window.open("https://playvalorant.com");
    if(game==="cod") window.open("https://www.callofduty.com");
    if(game==="roblox") window.open("https://www.roblox.com");
}

function searchGames(input){
    let cards=document.querySelectorAll(".card");
    input=input.toLowerCase();

    cards.forEach(card=>{
        let text=card.innerText.toLowerCase();
        card.style.display=text.includes(input)?"block":"none";
    });
}
</script>

</body>
</html>

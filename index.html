<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansh Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:#000;
    align-items:center;
}

button{
    background:#00ffcc;
    border:none;
    padding:6px 12px;
    cursor:pointer;
    border-radius:4px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1e1e1e;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

/* POPUPS */
.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:8px;
    width:300px;
}

iframe{
    width:100%;
    height:200px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Ansh Games</h2>
    <div id="authArea">
        <button onclick="showLogin()">Login</button>
    </div>
</div>

<!-- GAMES -->
<div class="grid">

<div class="card">
<img src="fortnite.jpg">
<div class="card-content">
<h3>Fortnite</h3>
<button onclick="openGame('fortnite')">Download</button>
<button onclick="addFav('Fortnite')">❤️</button>
<button onclick="showTrailer('https://www.youtube.com/embed/2gUtfBmw86Y')">🎥</button>
</div>
</div>

<div class="card">
<img src="gta.jpg">
<div class="card-content">
<h3>GTA V</h3>
<button onclick="openGame('gta')">Download</button>
<button onclick="addFav('GTA V')">❤️</button>
<button onclick="showTrailer('https://www.youtube.com/embed/QkkoHAzjnUs')">🎥</button>
</div>
</div>

<div class="card">
<img src="minecraft.jpg">
<div class="card-content">
<h3>Minecraft</h3>
<button onclick="openGame('minecraft')">Download</button>
<button onclick="addFav('Minecraft')">❤️</button>
<button onclick="showTrailer('https://www.youtube.com/embed/MmB9b5njVbA')">🎥</button>
</div>
</div>

</div>

<!-- LOGIN -->
<div class="popup" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="closeLogin()">Close</button>
</div>

<!-- PROFILE -->
<div class="popup" id="profileBox">
<h3>Profile</h3>
<p id="profileName"></p>

<h4>Favorite Games:</h4>
<ul id="favList"></ul>

<button onclick="closeProfile()">Close</button>
</div>

<!-- TRAILER -->
<div class="popup" id="trailerBox">
<iframe id="videoFrame" src=""></iframe><br>
<button onclick="closeTrailer()">Close</button>
</div>

<script>

/* LOAD USER ON REFRESH */
window.onload = function(){
    let user = localStorage.getItem("user");
    if(user){
        showUser(user);
    }
};

/* SHOW USER */
function showUser(user){
    document.getElementById("authArea").innerHTML =
    `<span>${user}</span>
     <button onclick="openProfile()">Profile</button>
     <button onclick="logout()">Logout</button>`;
}

/* LOGIN */
function login(){
    let user = username.value;
    let pass = password.value;

    if(user === localStorage.getItem("user") && pass === localStorage.getItem("pass")){
        showUser(user);
        closeLogin();
    } else {
        alert("Wrong details");
    }
}

/* SIGNUP */
function signup(){
    localStorage.setItem("user", username.value);
    localStorage.setItem("pass", password.value);
    alert("Account created");
}

/* LOGOUT */
function logout(){
    localStorage.clear();
    location.reload();
}

/* LOGIN UI */
function showLogin(){ loginBox.style.display="block"; }
function closeLogin(){ loginBox.style.display="none"; }

/* GAME LINKS */
function openGame(game){
    if(game==="fortnite") window.open("https://www.epicgames.com/fortnite");
    if(game==="gta") window.open("https://www.rockstargames.com/gta-v");
    if(game==="minecraft") window.open("https://www.minecraft.net");
}

/* FAVORITES (NO DUPLICATES) */
function addFav(game){
    let favs = JSON.parse(localStorage.getItem("favs")) || [];

    if(!favs.includes(game)){
        favs.push(game);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("Added to favorites");
    } else {
        alert("Already added");
    }
}

/* PROFILE */
function openProfile(){
    let user = localStorage.getItem("user");
    document.getElementById("profileName").innerText = user;

    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    let list = document.getElementById("favList");
    list.innerHTML = "";

    favs.forEach(f=>{
        list.innerHTML += "<li>"+f+"</li>";
    });

    profileBox.style.display="block";
}

function closeProfile(){
    profileBox.style.display="none";
}

/* TRAILER */
function showTrailer(link){
    videoFrame.src = link;
    trailerBox.style.display="block";
}

function closeTrailer(){
    trailerBox.style.display="none";
    videoFrame.src="";
}

</script>

</body>
</html>
